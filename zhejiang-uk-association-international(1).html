<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英国浙江联谊会暨商贸会 | Zhejiang UK Association</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@500;600;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --red:#C8102E;--red-2:#A50D26;--red-3:#7E0A1D;--red-soft:#FBE7EA;
    --navy:#0E2A54;--navy-2:#0A2144;--navy-3:#071634;--navy-soft:#E7EDF7;
    /* “trim/accent” 系列(现为蓝色系,变量名沿用) */
    --gold:#0E2A54;--gold-2:#2A4C7C;--gold-soft:#D7E2F1;
    --cream:#F5F7FB;--cream-2:#E9EEF6;--white:#FFFFFF;
    --ink:#15233B;--ink-soft:#48566C;--faint:#8894A6;--line:#E1E7F0;--line-2:#CFD9E8;
    --serif:"Noto Serif SC",serif;--sans:"Noto Sans SC",sans-serif;--latin:"Cormorant Garamond",Georgia,serif;
    --r:14px;--r-sm:8px;
    --wrap:1240px;--gut:clamp(20px,5vw,68px);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{font-family:var(--sans);color:var(--ink);background:var(--cream);line-height:1.75;-webkit-font-smoothing:antialiased;overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  img{max-width:100%;display:block}
  ::selection{background:var(--red);color:#fff}
  .wrap{max-width:var(--wrap);margin:0 auto;padding-inline:var(--gut)}
  .eyebrow{font-family:var(--latin);font-size:.95rem;letter-spacing:.3em;text-transform:uppercase;color:var(--gold-2);font-weight:600}
  .kk{display:inline-flex;align-items:center;gap:12px}
  .kk::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--red)}

  .divider{display:flex;align-items:center;gap:16px;padding:6px 0}
  .divider span{height:1px;background:var(--gold-soft);flex:1}
  .divider i{width:10px;height:10px;border-radius:50%;background:var(--navy);flex-shrink:0;box-shadow:0 0 0 5px var(--cream),0 0 0 6px var(--gold-soft)}

  .figbox{border-radius:var(--r);overflow:hidden;border:1px solid var(--line);background:var(--cream-2)}
  .figbox img,.figbox iframe{width:100%;height:100%;object-fit:cover;display:block;border:0}
  .figbox.ph{display:grid;place-items:center;background:linear-gradient(140deg,var(--cream-2),var(--navy-soft))}
  .figbox.ph span{font-family:var(--serif);color:var(--gold-2);letter-spacing:.06em;font-size:.92rem;padding:14px;text-align:center}

  /* ============ HEADER ============ */
  .topline{height:4px;background:linear-gradient(90deg,var(--navy),var(--red),var(--navy))}
  header{position:sticky;top:0;z-index:80;background:rgba(245,247,251,.92);backdrop-filter:saturate(140%) blur(12px);border-bottom:1px solid var(--line)}
  .bar{display:flex;align-items:center;justify-content:space-between;height:74px;gap:14px}
  .brand{display:flex;align-items:center;gap:11px;flex-shrink:0;cursor:pointer}
  .seal{width:44px;height:44px;flex-shrink:0;background:var(--red);border:2px solid var(--navy);border-radius:50%;display:grid;place-items:center;color:#fff;font-family:var(--serif);font-weight:900;font-size:1.3rem;box-shadow:inset 0 0 0 3px rgba(255,255,255,.25);line-height:1}
  .brand-txt b{font-family:var(--serif);font-weight:700;font-size:1rem;letter-spacing:.04em;display:block;line-height:1.2;white-space:nowrap;color:var(--navy)}
  .brand-txt span{font-family:var(--latin);font-size:.66rem;letter-spacing:.2em;color:var(--faint);text-transform:uppercase;white-space:nowrap}
  nav.main{display:flex;align-items:center;gap:0}
  .nav-item{position:relative}
  .nav-link{display:inline-flex;align-items:center;gap:5px;padding:9px 12px;font-size:.93rem;font-weight:500;color:var(--ink-soft);border-radius:30px;transition:.22s;cursor:pointer;background:none;border:0;font-family:inherit;white-space:nowrap}
  .nav-link:hover,.nav-link.active{color:var(--red)}
  .nav-link.active{background:var(--red-soft)}
  .car{width:7px;height:7px;border-right:1.6px solid currentColor;border-bottom:1.6px solid currentColor;transform:rotate(45deg) translateY(-2px);transition:.22s}
  .nav-item:hover .car{transform:rotate(225deg) translateY(-1px)}
  .dropdown{position:absolute;top:calc(100% + 8px);left:0;min-width:182px;background:var(--white);border:1px solid var(--line);border-radius:14px;padding:8px;box-shadow:0 24px 50px -26px rgba(14,42,84,.32);opacity:0;visibility:hidden;transform:translateY(8px);transition:.22s;border-top:3px solid var(--red)}
  .nav-item:hover .dropdown{opacity:1;visibility:visible;transform:translateY(0)}
  .dropdown a{display:block;padding:9px 14px;font-size:.9rem;color:var(--ink-soft);border-radius:20px;transition:.18s;white-space:nowrap}
  .dropdown a:hover{background:var(--navy-soft);color:var(--navy)}
  .actions{display:flex;align-items:center;gap:9px;flex-shrink:0}
  .lang{display:inline-flex;border:1px solid var(--navy);border-radius:30px;overflow:hidden;font-size:.8rem;font-weight:500}
  .lang button{padding:6px 12px;background:none;border:0;cursor:pointer;color:var(--navy);font-family:inherit;transition:.2s;line-height:1}
  .lang button.on{background:var(--navy);color:#fff}
  .btn-join{padding:9px 20px;border-radius:30px;background:var(--red);color:#fff;font-weight:500;font-size:.9rem;border:0;transition:.22s;white-space:nowrap;cursor:pointer}
  .btn-join:hover{background:var(--red-2)}
  .burger{display:none;flex-direction:column;gap:5px;background:none;border:0;cursor:pointer;padding:8px}
  .burger span{width:24px;height:2px;background:var(--navy);transition:.3s}

  .btn{padding:14px 30px;border-radius:32px;font-weight:500;font-size:1rem;transition:.25s;border:1.5px solid transparent;display:inline-flex;align-items:center;gap:9px;cursor:pointer;font-family:inherit}
  .btn-primary{background:var(--red);color:#fff}
  .btn-primary:hover{background:var(--red-2);transform:translateY(-2px)}
  .btn-gold{background:var(--red);color:#fff}
  .btn-gold:hover{background:var(--red-2);transform:translateY(-2px)}
  .btn-ghost{border-color:var(--navy);color:var(--navy)}
  .btn-ghost:hover{background:var(--navy);color:#fff;transform:translateY(-2px)}

  /* ============ HOME HERO ============ */
  .hero{position:relative;padding:clamp(54px,8vw,100px) 0 clamp(46px,6vw,78px);overflow:hidden}
  .hero::before{content:"";position:absolute;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,var(--navy-soft),transparent 66%);right:-6%;top:-12%;z-index:0}
  .hero::after{content:"";position:absolute;left:-150px;bottom:-150px;width:360px;height:360px;border-radius:50%;border:1.5px solid var(--gold-soft);z-index:0}
  .hero-grid{position:relative;z-index:1;display:grid;grid-template-columns:1.1fr .9fr;gap:clamp(32px,6vw,72px);align-items:center}
  .hero h1{font-family:var(--serif);font-weight:900;font-size:clamp(2.4rem,6vw,4.5rem);line-height:1.12;letter-spacing:.02em;margin:.5em 0 .42em;color:var(--navy)}
  .hero h1 em{font-style:normal;color:var(--red);position:relative}
  .hero h1 em::after{content:"";position:absolute;left:0;right:0;bottom:.04em;height:.14em;background:var(--gold-soft)}
  .hero .lead{font-size:1.08rem;color:var(--ink-soft);max-width:34em;line-height:1.85}
  .hero-cta{display:flex;gap:14px;flex-wrap:wrap;margin-top:32px}
  .hero-stats{display:flex;gap:34px;margin-top:42px;flex-wrap:wrap}
  .stat b{font-family:var(--serif);font-size:2rem;color:var(--red);font-weight:700;line-height:1}
  .stat span{display:block;font-size:.8rem;color:var(--faint);margin-top:6px;letter-spacing:.04em}
  .hero-photo{aspect-ratio:1/1;border-radius:50%;overflow:hidden;border:3px solid var(--navy);box-shadow:0 40px 70px -42px rgba(14,42,84,.5);max-width:440px;margin-left:auto}
  .hero-photo img{width:100%;height:100%;object-fit:cover}

  /* circular medallion */
  .medallion-wrap{max-width:440px;margin-left:auto;text-align:center}
  .medallion{position:relative;width:100%;aspect-ratio:1/1}
  .medallion svg{width:100%;height:100%;filter:drop-shadow(0 30px 50px rgba(14,42,84,.3))}
  .medallion .m-ring{fill:none;stroke:var(--navy);stroke-width:1.5}
  .medallion .m-disc{fill:var(--red)}
  .medallion .m-frame{fill:none;stroke:rgba(255,255,255,.6);stroke-width:1.5}
  .medallion .m-arc{fill:none;stroke:var(--navy);stroke-width:4;stroke-linecap:round}
  .medallion .m-ch{fill:#fff;font-family:var(--serif);font-weight:900;font-size:150px}
  .medallion .m-dot{fill:var(--navy)}
  .m-caption{margin-top:22px}
  .m-caption b{font-family:var(--latin);letter-spacing:.24em;text-transform:uppercase;font-size:.86rem;color:var(--gold-2);display:block}
  .m-caption span{font-family:var(--serif);font-size:1.2rem;letter-spacing:.3em;color:var(--navy);margin-top:6px;display:block}

  /* ============ BANNER ============ */
  .banner{position:relative;background:linear-gradient(150deg,var(--navy),var(--navy-3));color:#E7EEF9;padding:clamp(54px,7vw,90px) 0 clamp(40px,5vw,58px);overflow:hidden}
  .banner::after{content:"";position:absolute;right:-140px;top:50%;transform:translateY(-50%);width:340px;height:340px;border-radius:50%;border:2px solid rgba(255,255,255,.16)}
  .banner::before{content:"";position:absolute;left:-90px;bottom:-90px;width:220px;height:220px;border-radius:50%;background:rgba(200,16,46,.28)}
  .banner .wrap{position:relative;z-index:1}
  .banner .eyebrow{color:#9FC0EC}
  .banner .kk::before{background:var(--red)}
  .banner h1{font-family:var(--serif);font-weight:700;font-size:clamp(2rem,5vw,3.3rem);line-height:1.18;margin:.4em 0 .3em;letter-spacing:.03em;color:#fff}
  .banner p{color:#C4D3E8;max-width:40em;font-size:1.04rem;line-height:1.85}
  .crumb{font-size:.82rem;color:#9BB2D2;letter-spacing:.06em;margin-top:18px}
  .crumb span{color:#9FC0EC}

  .pad{padding:clamp(56px,8vw,100px) 0}
  .pad-sm{padding:clamp(42px,6vw,72px) 0}
  .sec-head{margin-bottom:clamp(34px,4.5vw,54px);max-width:62em}
  .sec-head h2{font-family:var(--serif);font-weight:700;font-size:clamp(1.7rem,3.6vw,2.6rem);line-height:1.22;margin:.4em 0 .3em;letter-spacing:.02em;color:var(--navy)}
  .sec-head p{color:var(--ink-soft);font-size:1.03rem;max-width:42em;line-height:1.85}
  .lede{font-size:1.1rem;color:var(--ink-soft);line-height:1.95;max-width:46em;margin-bottom:20px}
  .lede strong{color:var(--navy);font-weight:600}

  .grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:22px}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
  .card{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:30px;transition:.3s;position:relative;overflow:hidden}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--red);transform:scaleY(0);transform-origin:top;transition:transform .35s}
  .card:hover{transform:translateY(-5px);box-shadow:0 28px 50px -32px rgba(14,42,84,.28);border-color:var(--gold-soft)}
  .card:hover::before{transform:scaleY(1)}
  .card .ico{width:52px;height:52px;border-radius:50%;background:var(--navy-soft);color:var(--navy);display:grid;place-items:center;font-family:var(--serif);font-weight:700;font-size:1.3rem;margin-bottom:18px;transition:.25s}
  .card:hover .ico{background:var(--red);color:#fff}
  .card h3{font-family:var(--serif);font-size:1.26rem;font-weight:600;margin-bottom:9px;letter-spacing:.02em}
  .card h3 small{display:block;font-family:var(--latin);letter-spacing:.13em;text-transform:uppercase;font-size:.68rem;color:var(--faint);font-weight:500;margin-top:5px}
  .card p{color:var(--ink-soft);font-size:.95rem;line-height:1.8}
  .card .more{margin-top:16px;font-size:.86rem;color:var(--red);font-weight:500;display:inline-flex;gap:6px}
  .card.link{cursor:pointer}

  .ledger{border-top:2px solid var(--navy);margin-top:10px}
  .srow{display:grid;grid-template-columns:104px 1fr;border-bottom:1px solid var(--line);transition:background .3s;position:relative}
  .srow:hover{background:var(--white)}
  .srow::after{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--red);transform:scaleY(0);transform-origin:top;transition:.35s}
  .srow:hover::after{transform:scaleY(1)}
  .srow .num{grid-row:1/3;display:flex;align-items:flex-start;justify-content:center;padding-top:32px}
  .srow .num span{width:56px;height:56px;border-radius:50%;border:1.5px solid var(--navy);display:grid;place-items:center;font-family:var(--serif);font-size:1.5rem;font-weight:700;color:var(--red);transition:.3s}
  .srow:hover .num span{border-color:var(--red);background:var(--red-soft);transform:scale(1.06)}
  .srow .scon{padding:30px 8px 30px 26px;display:grid;grid-template-columns:.4fr 1fr;gap:26px;align-items:baseline}
  .srow h3{font-family:var(--serif);font-size:1.34rem;font-weight:600;letter-spacing:.03em;line-height:1.4;color:var(--navy)}
  .srow h3 small{display:block;font-family:var(--latin);letter-spacing:.13em;text-transform:uppercase;font-size:.7rem;color:var(--faint);font-weight:500;margin-top:5px}
  .srow .sdesc{color:var(--ink-soft);font-size:.98rem;line-height:1.85}
  .srow .sdesc strong{color:var(--ink);font-weight:500}

  .taglist{list-style:none;display:flex;flex-wrap:wrap;gap:9px;margin-top:18px}
  .taglist li{font-size:.84rem;padding:6px 16px;border:1px solid var(--navy);border-radius:30px;color:var(--navy)}
  .checklist{list-style:none;display:grid;gap:12px;margin-top:8px}
  .checklist li{padding-left:32px;position:relative;color:var(--ink-soft);line-height:1.7}
  .checklist li::before{content:"";position:absolute;left:0;top:4px;width:18px;height:18px;border-radius:50%;background:var(--red-soft)}
  .checklist li::after{content:"";position:absolute;left:6px;top:9px;width:7px;height:4px;border-left:2px solid var(--red);border-bottom:2px solid var(--red);transform:rotate(-45deg)}

  .person{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:26px;text-align:center;transition:.3s}
  .person:hover{transform:translateY(-5px);box-shadow:0 24px 44px -30px rgba(14,42,84,.28)}
  .person .av{width:84px;height:84px;margin:0 auto 16px;border-radius:50%;overflow:hidden;background:linear-gradient(150deg,var(--red),var(--red-3));border:2px solid var(--navy);display:grid;place-items:center;color:#fff;font-family:var(--serif);font-size:2rem;font-weight:700}
  .person .av img{width:100%;height:100%;object-fit:cover}
  .person b{font-family:var(--serif);font-size:1.16rem;display:block}
  .person span{font-size:.86rem;color:var(--gold-2);letter-spacing:.04em}

  .timeline{position:relative;margin-left:9px;padding-left:32px;border-left:2px solid var(--gold-soft)}
  .tl{position:relative;padding-bottom:34px}
  .tl::before{content:"";position:absolute;left:-42px;top:2px;width:18px;height:18px;border-radius:50%;background:var(--red);border:3px solid var(--cream);box-shadow:0 0 0 2px var(--navy)}
  .tl .yr{font-family:var(--serif);color:var(--red);font-weight:700;font-size:1.1rem}
  .tl b{display:block;font-size:1.06rem;margin:3px 0 4px}
  .tl p{color:var(--ink-soft);font-size:.94rem}

  .gallery{display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:165px;gap:16px}
  .tile{border-radius:var(--r);overflow:hidden;position:relative;display:flex;align-items:flex-end;padding:20px;color:#fff;transition:.35s;border:1px solid var(--line);background-size:cover;background-position:center}
  .tile:hover{transform:scale(1.015)}
  .tile.big{grid-column:span 2;grid-row:span 2}
  .tile::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 38%,rgba(7,22,52,.8));z-index:1}
  .tile .lab{position:relative;z-index:2}
  .tile .lab small{font-family:var(--latin);letter-spacing:.2em;text-transform:uppercase;font-size:.66rem;opacity:.9;display:block;margin-bottom:4px}
  .tile .lab b{font-family:var(--serif);font-size:1.2rem;font-weight:600;letter-spacing:.05em}
  .tile.g1{background-image:linear-gradient(140deg,#0E2A54,#071634)}
  .tile.g2{background-image:linear-gradient(140deg,#C8102E,#7E0A1D)}
  .tile.g3{background-image:linear-gradient(140deg,#1B4C8A,#0A2144)}
  .tile.g4{background-image:linear-gradient(140deg,#A50D26,#4d0712)}
  .tile.g5{background-image:linear-gradient(140deg,#2A4C7C,#0E2A54)}
  .play{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:56px;height:56px;border:2px solid rgba(255,255,255,.85);border-radius:50%;display:grid;place-items:center;z-index:2;transition:.3s}
  .tile:hover .play{background:rgba(255,255,255,.18);transform:translate(-50%,-50%) scale(1.08)}
  .play::after{content:"";border-left:13px solid #fff;border-top:8px solid transparent;border-bottom:8px solid transparent;margin-left:3px}

  .evt{display:flex;align-items:center;gap:22px;background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:18px 24px;transition:.3s}
  .evt:hover{border-color:var(--gold-soft);box-shadow:0 22px 40px -30px rgba(14,42,84,.28);transform:translateX(4px)}
  .evt .evt-thumb{width:150px;height:96px;border-radius:var(--r-sm);flex-shrink:0;background-size:cover;background-position:center;border:1px solid var(--line)}
  .evt .date{width:74px;height:74px;flex-shrink:0;border-radius:50%;background:var(--red-soft);display:flex;flex-direction:column;align-items:center;justify-content:center}
  .evt .date b{font-family:var(--serif);font-size:1.55rem;color:var(--red);display:block;line-height:1}
  .evt .date span{font-size:.68rem;color:var(--red-2);letter-spacing:.1em}
  .evt .ec{flex:1}
  .evt h4{font-family:var(--serif);font-size:1.22rem;font-weight:600;margin-bottom:5px;color:var(--navy)}
  .evt p{color:var(--ink-soft);font-size:.92rem}
  .evt .go{width:40px;height:40px;border-radius:50%;border:1.5px solid var(--navy);color:var(--navy);display:grid;place-items:center;font-size:1.1rem;flex-shrink:0;transition:.25s}
  .evt:hover .go{background:var(--red);color:#fff;border-color:var(--red)}

  .steps{counter-reset:s;display:grid;gap:16px}
  .step{counter-increment:s;display:grid;grid-template-columns:60px 1fr;gap:20px;align-items:start;background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:24px 26px}
  .step::before{content:counter(s);width:52px;height:52px;border-radius:50%;background:var(--navy);color:#fff;font-family:var(--serif);font-weight:700;font-size:1.3rem;display:grid;place-items:center}
  .step b{font-family:var(--serif);font-size:1.14rem;display:block;margin-bottom:4px}
  .step p{color:var(--ink-soft);font-size:.94rem}

  .cform{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:clamp(26px,3vw,40px)}
  .field{margin-bottom:18px}
  .field label{display:block;font-size:.86rem;color:var(--ink-soft);margin-bottom:7px;font-weight:500}
  .field input,.field textarea{width:100%;padding:13px 15px;border:1px solid var(--line);border-radius:12px;font-family:inherit;font-size:.95rem;background:var(--cream);color:var(--ink);transition:.2s}
  .field input:focus,.field textarea:focus{outline:none;border-color:var(--navy);background:#fff;box-shadow:0 0 0 3px var(--navy-soft)}
  .field textarea{min-height:120px;resize:vertical}
  .formnote{font-size:.86rem;color:var(--red);margin-top:10px;display:none}
  .contact-info{display:grid;gap:18px}
  .ci{display:flex;gap:14px;align-items:center}
  .ci .ci-ic{width:46px;height:46px;flex-shrink:0;border-radius:50%;background:var(--navy-soft);color:var(--navy);display:grid;place-items:center;font-size:1.05rem}
  .ci b{display:block;font-family:var(--serif);font-size:1.02rem}
  .ci span{color:var(--ink-soft);font-size:.92rem}

  .ctaband{position:relative;background:linear-gradient(150deg,var(--navy),var(--navy-3));color:#E7EEF9;text-align:center;overflow:hidden}
  .ctaband::before{content:"";position:absolute;left:-100px;top:50%;transform:translateY(-50%);width:280px;height:280px;border-radius:50%;border:1.5px solid rgba(255,255,255,.16)}
  .ctaband::after{content:"";position:absolute;right:-100px;top:50%;transform:translateY(-50%);width:280px;height:280px;border-radius:50%;border:1.5px solid rgba(200,16,46,.5)}
  .ctaband .wrap{position:relative;z-index:1}
  .ctaband .eyebrow{color:#9FC0EC}
  .ctaband .kk::before{background:var(--red)}
  .ctaband h2{font-family:var(--serif);font-size:clamp(1.8rem,4vw,2.8rem);font-weight:700;margin:16px 0 16px;line-height:1.28;color:#fff}
  .ctaband p{color:#C4D3E8;max-width:38em;margin:0 auto 32px;font-size:1.06rem}
  .bg-white{background:var(--white);border-block:1px solid var(--line)}

  footer{background:var(--navy-3);color:#A9BAD6;padding:clamp(52px,7vw,78px) 0 32px;font-size:.92rem}
  .foot-grid{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:40px;margin-bottom:46px}
  .foot-brand .seal{width:48px;height:48px;font-size:1.45rem;border-color:#fff}
  .foot-brand b{font-family:var(--serif);color:#fff;font-size:1.14rem;display:block;margin:16px 0 10px}
  .foot-brand p{max-width:26em;line-height:1.8}
  footer h5{font-family:var(--serif);color:#fff;font-size:1rem;margin-bottom:16px;font-weight:600;letter-spacing:.05em}
  footer ul{list-style:none;display:flex;flex-direction:column;gap:10px}
  footer ul a{color:#A9BAD6;transition:.2s;cursor:pointer}
  footer ul a:hover{color:#fff;padding-left:4px}
  .foot-bot{border-top:1px solid rgba(255,255,255,.12);padding-top:24px;display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;font-size:.82rem;color:#7E90B0}

  .reveal{opacity:0;transform:translateY(24px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1)}
  .reveal.in{opacity:1;transform:none}

  .mmenu{position:fixed;inset:0;background:var(--cream);z-index:200;transform:translateX(100%);transition:transform .4s cubic-bezier(.4,0,.2,1);overflow-y:auto;padding:28px var(--gut)}
  .mmenu.open{transform:none}
  .mclose{position:absolute;top:22px;right:var(--gut);font-size:2rem;background:none;border:0;cursor:pointer;color:var(--navy)}
  .mgrp{border-bottom:1px solid var(--line);padding:16px 0}
  .mgrp>span{font-family:var(--serif);font-size:1.24rem;font-weight:600;color:var(--navy);display:block;margin-bottom:8px;cursor:pointer}
  .mgrp a{display:block;padding:7px 0;color:var(--ink-soft);cursor:pointer}

  @media(max-width:1180px){
    nav.main{display:none}.btn-join{display:none}.burger{display:flex}
    .hero-grid{grid-template-columns:1fr}.medallion-wrap,.hero-photo{max-width:340px;margin:0 auto}
    .grid4{grid-template-columns:repeat(2,1fr)}.gallery{grid-template-columns:repeat(2,1fr)}.tile.big{grid-column:span 2;grid-row:span 1}
  }
  @media(max-width:760px){
    .grid2,.grid3,.grid4{grid-template-columns:1fr}
    .gallery{grid-template-columns:1fr;grid-auto-rows:190px}.tile.big{grid-column:span 1}
    .srow{grid-template-columns:70px 1fr}.srow .num{padding-top:28px}.srow .num span{width:46px;height:46px;font-size:1.2rem}
    .srow .scon{grid-template-columns:1fr;padding:24px 6px 26px 18px;gap:12px}
    .evt{flex-wrap:wrap}.evt .evt-thumb{width:100%;height:160px}.evt .go{display:none}
    .foot-grid{grid-template-columns:1fr 1fr}.foot-bot{flex-direction:column}
  }
  @media(max-width:760px){
    .business-mark::before{inset:7% 3% 2% 7%}
    .m-caption{grid-template-columns:1fr;gap:5px;align-items:start}
    .m-caption span{font-size:.68rem}
  }
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto!important}.reveal{opacity:1;transform:none}}

/* ================================================================
   INTERNATIONAL EDITORIAL REDESIGN
   Visual-only layer. Existing routes, bilingual switch, menus,
   forms, image settings and JavaScript behaviour remain unchanged.
================================================================ */
:root{
  --red:#9B1C31;
  --red-2:#781426;
  --red-3:#55101C;
  --red-soft:#F4E8E9;
  --navy:#11263F;
  --navy-2:#0B1D32;
  --navy-3:#081523;
  --navy-soft:#E9EEF2;
  --gold:#B08A59;
  --gold-2:#80623F;
  --gold-soft:#E6DCCF;
  --cream:#F7F5F0;
  --cream-2:#EEEAE3;
  --white:#FFFEFB;
  --ink:#1A232D;
  --ink-soft:#55616D;
  --faint:#85909B;
  --line:#DDD9D1;
  --line-2:#CAC4BA;
  --serif:"Noto Serif SC","Songti SC","STSong",serif;
  --sans:"Inter","Noto Sans SC","PingFang SC","Microsoft YaHei",sans-serif;
  --latin:"Cormorant Garamond",Georgia,serif;
  --r:6px;
  --r-sm:3px;
  --wrap:1360px;
  --gut:clamp(22px,5vw,76px);
}

body{
  background:
    radial-gradient(circle at 87% 8%,rgba(176,138,89,.06),transparent 24rem),
    var(--cream);
  color:var(--ink);
  line-height:1.72;
  font-weight:400;
}
body[data-lang="en"]{letter-spacing:.002em}
body[data-lang="en"] .hero h1,
body[data-lang="en"] .banner h1,
body[data-lang="en"] .sec-head h2,
body[data-lang="en"] .ctaband h2{
  font-family:var(--latin);
  font-weight:600;
  letter-spacing:-.025em;
}
::selection{background:var(--navy);color:#fff}
.wrap{width:100%}

/* Editorial micro-labels */
.eyebrow{
  font-family:var(--sans);
  font-size:.72rem;
  letter-spacing:.22em;
  color:var(--gold-2);
  font-weight:600;
}
.kk{gap:11px}
.kk::before{
  width:28px;
  height:1px;
  border-radius:0;
  background:var(--red);
}
.divider{gap:18px;padding:0}
.divider span{background:var(--line)}
.divider i{
  width:5px;height:5px;background:var(--gold);box-shadow:none;border-radius:50%
}

.figbox{
  border-radius:var(--r-sm);
  border-color:var(--line);
  box-shadow:0 18px 55px -46px rgba(17,38,63,.45);
}
.figbox.ph{
  background:
    linear-gradient(135deg,rgba(255,255,255,.55),transparent 48%),
    linear-gradient(135deg,var(--cream-2),var(--navy-soft));
}
.figbox.ph span{font-family:var(--sans);font-size:.78rem;letter-spacing:.08em;color:var(--faint)}

/* Header */
.topline{height:2px;background:var(--red)}
header{
  background:rgba(247,245,240,.93);
  border-bottom:1px solid rgba(202,196,186,.72);
  backdrop-filter:saturate(115%) blur(18px);
  box-shadow:0 8px 30px -28px rgba(8,21,35,.65);
}
.bar{height:82px;gap:22px}
.brand{gap:13px}
.seal{
  width:42px;height:42px;
  border:1px solid var(--red);
  border-radius:4px;
  background:var(--red);
  box-shadow:none;
  font-size:1.16rem;
}
.brand-txt b{
  font-family:var(--serif);
  font-size:.94rem;
  letter-spacing:.025em;
  color:var(--ink);
}
.brand-txt span{
  font-family:var(--sans);
  font-size:.56rem;
  font-weight:600;
  letter-spacing:.18em;
  color:var(--faint);
  margin-top:4px;
  display:block;
}
nav.main{gap:4px}
.nav-link{
  position:relative;
  padding:11px 9px 10px;
  border-radius:0;
  font-size:.84rem;
  color:#46515D;
  font-weight:500;
}
.nav-link::after{
  content:"";
  position:absolute;
  left:9px;right:9px;bottom:4px;
  height:1px;
  background:var(--red);
  transform:scaleX(0);
  transform-origin:left;
  transition:transform .25s ease;
}
.nav-link:hover,.nav-link.active{color:var(--ink);background:transparent}
.nav-link:hover::after,.nav-link.active::after{transform:scaleX(1)}
.car{width:6px;height:6px;border-width:1px}
.dropdown{
  top:calc(100% + 10px);
  min-width:210px;
  border:1px solid var(--line);
  border-top:1px solid var(--line);
  border-radius:4px;
  padding:8px;
  background:rgba(255,254,251,.98);
  box-shadow:0 24px 70px -32px rgba(8,21,35,.42);
}
.dropdown a{
  padding:10px 12px;
  border-radius:2px;
  font-size:.83rem;
  border-left:2px solid transparent;
}
.dropdown a:hover{background:var(--cream);color:var(--ink);border-left-color:var(--red)}
.actions{gap:12px}
.lang{
  border-color:var(--line-2);
  border-radius:3px;
  background:rgba(255,255,255,.4);
  font-size:.72rem;
}
.lang button{padding:7px 10px;color:var(--ink-soft)}
.lang button.on{background:var(--navy);color:#fff}
.btn-join{
  padding:11px 17px;
  border-radius:3px;
  background:var(--red);
  font-size:.82rem;
  font-weight:600;
  letter-spacing:.025em;
}
.btn-join:hover{background:var(--red-2);transform:translateY(-1px)}
.burger{border:1px solid var(--line);border-radius:3px;padding:9px}
.burger span{width:21px;height:1px}

/* Buttons */
.btn{
  min-height:48px;
  padding:12px 24px;
  border-radius:3px;
  font-size:.9rem;
  font-weight:600;
  letter-spacing:.02em;
  box-shadow:none;
}
.btn-primary,.btn-gold{background:var(--red)}
.btn-primary:hover,.btn-gold:hover{background:var(--red-2);transform:translateY(-2px);box-shadow:0 14px 30px -20px rgba(120,20,38,.65)}
.btn-ghost{border-color:var(--line-2);color:var(--ink);background:rgba(255,255,255,.18)}
.btn-ghost:hover{background:var(--navy);border-color:var(--navy);color:#fff}

/* Home hero */
.hero{
  min-height:calc(100vh - 84px);
  display:flex;
  align-items:center;
  padding:clamp(70px,9vw,132px) 0 clamp(68px,8vw,116px);
  background:
    linear-gradient(90deg,rgba(17,38,63,.045) 1px,transparent 1px),
    linear-gradient(rgba(17,38,63,.045) 1px,transparent 1px);
  background-size:72px 72px;
}
.hero::before{
  width:min(48vw,680px);height:min(48vw,680px);
  right:-11%;top:-20%;
  background:radial-gradient(circle,rgba(176,138,89,.18),rgba(176,138,89,.04) 45%,transparent 68%);
}
.hero::after{
  left:auto;right:8%;bottom:7%;
  width:clamp(140px,18vw,260px);height:clamp(140px,18vw,260px);
  border:1px solid rgba(155,28,49,.24);
}
.hero-grid{grid-template-columns:minmax(0,1.22fr) minmax(330px,.78fr);gap:clamp(56px,8vw,118px)}
.hero h1{
  max-width:10.5em;
  font-size:clamp(3rem,6.6vw,6.35rem);
  line-height:.99;
  letter-spacing:-.045em;
  margin:.27em 0 .28em;
  color:var(--navy);
}
.hero h1 em{color:var(--red)}
.hero h1 em::after{
  bottom:-.02em;height:1px;
  background:var(--gold);
  opacity:.65;
}
.hero .lead{
  max-width:39em;
  font-size:clamp(1rem,1.25vw,1.12rem);
  line-height:1.9;
  color:#53606C;
}
.hero-cta{margin-top:34px;gap:12px}
.hero-stats{
  gap:0;
  margin-top:56px;
  padding-top:24px;
  border-top:1px solid var(--line-2);
}
.stat{padding:0 26px;border-right:1px solid var(--line);min-width:138px}
.stat:first-child{padding-left:0}
.stat:last-child{border-right:0}
.stat b{
  font-family:var(--latin);
  color:var(--navy);
  font-size:1.75rem;
  font-weight:600;
  letter-spacing:-.02em;
}
.stat span{font-size:.72rem;letter-spacing:.04em;color:var(--faint)}
.hero-photo{
  border-radius:3px;
  border:0;
  box-shadow:28px 34px 0 -20px var(--red-soft),0 42px 90px -50px rgba(8,21,35,.58);
  max-width:500px;
}
.medallion-wrap{max-width:500px}
/* Corporate geometric mark: an abstract Z / bridge between Zhejiang and Britain */
.business-mark{
  position:relative;
  width:100%;
  aspect-ratio:1/1;
  display:grid;
  place-items:center;
}
.business-mark::before{
  content:"";
  position:absolute;
  inset:7% 2% 2% 9%;
  border:1px solid rgba(176,138,89,.42);
  background:rgba(255,255,255,.5);
  box-shadow:0 34px 80px -48px rgba(8,21,35,.5);
}
.business-mark::after{
  content:"";
  position:absolute;
  width:44%;
  height:44%;
  right:-2%;
  top:0;
  border-top:1px solid rgba(155,28,49,.42);
  border-right:1px solid rgba(155,28,49,.42);
}
.business-mark svg{
  position:relative;
  z-index:1;
  width:92%;
  height:92%;
  overflow:visible;
  filter:drop-shadow(0 25px 42px rgba(8,21,35,.14));
}
.business-mark .bm-navy{fill:var(--navy)}
.business-mark .bm-red{fill:var(--red)}
.business-mark .bm-gold{fill:var(--gold)}
.business-mark .bm-line{fill:none;stroke:rgba(255,255,255,.72);stroke-width:1}
.business-mark .bm-z{
  fill:none;
  stroke:#fff;
  stroke-width:28;
  stroke-linecap:square;
  stroke-linejoin:miter;
}
.business-mark .bm-axis{fill:none;stroke:var(--gold);stroke-width:2}
.business-mark .bm-code{
  fill:#fff;
  font-family:var(--sans);
  font-size:15px;
  font-weight:600;
  letter-spacing:4px;
}
.business-mark .bm-small{
  fill:rgba(255,255,255,.72);
  font-family:var(--sans);
  font-size:9px;
  font-weight:500;
  letter-spacing:2.5px;
}
.m-caption{
  margin-top:18px;
  border-top:1px solid var(--line-2);
  padding-top:18px;
  display:grid;
  grid-template-columns:1fr auto;
  gap:18px;
  align-items:end;
  text-align:left;
}
.m-caption b{font-family:var(--sans);font-size:.68rem;letter-spacing:.18em;color:var(--gold-2)}
.m-caption span{font-family:var(--sans);font-size:.74rem;letter-spacing:.14em;color:var(--ink-soft);margin-top:0;text-transform:uppercase}

/* Interior page masthead */
.banner{
  padding:clamp(74px,8vw,116px) 0 clamp(54px,6vw,82px);
  background:
    linear-gradient(120deg,rgba(255,255,255,.025),transparent 45%),
    linear-gradient(135deg,var(--navy),var(--navy-3));
  border-bottom:1px solid rgba(176,138,89,.45);
}
.banner::after{
  right:-5%;top:-68%;transform:none;
  width:470px;height:470px;
  border:1px solid rgba(176,138,89,.26);
}
.banner::before{
  left:auto;right:18%;bottom:-130px;
  width:270px;height:270px;
  background:transparent;
  border:1px solid rgba(255,255,255,.08);
}
.banner .eyebrow{color:#D0B48D}
.banner h1{
  max-width:900px;
  font-size:clamp(2.7rem,5.4vw,5rem);
  line-height:1.04;
  letter-spacing:-.035em;
  margin:.28em 0 .2em;
}
.banner p{max-width:48em;color:#C6D0D9;font-size:1rem;line-height:1.8}
.crumb{font-size:.7rem;color:#8294A4;letter-spacing:.08em;margin-top:24px}
.crumb span{color:#D0B48D}

.pad{padding:clamp(70px,8vw,116px) 0}
.pad-sm{padding:clamp(56px,6vw,82px) 0}
.sec-head{margin-bottom:clamp(40px,5vw,70px);max-width:70em}
.sec-head h2{
  font-size:clamp(2rem,4vw,3.45rem);
  line-height:1.08;
  letter-spacing:-.025em;
  margin:.32em 0 .24em;
  color:var(--navy);
}
.sec-head p{font-size:1rem;line-height:1.85;max-width:48em}
.lede{font-size:clamp(1.04rem,1.35vw,1.18rem);line-height:1.95;color:var(--ink-soft)}
.lede strong{color:var(--ink);font-weight:600}
.bg-white{background:rgba(255,254,251,.76);border-block:1px solid var(--line)}
.grid2{gap:clamp(28px,4vw,54px)}
.grid3{gap:22px}
.grid4{gap:18px}

/* Cards */
.card{
  background:rgba(255,254,251,.84);
  border:1px solid var(--line);
  border-radius:var(--r);
  padding:clamp(26px,3vw,38px);
}
.card::before{
  left:0;top:0;bottom:auto;width:100%;height:2px;
  background:linear-gradient(90deg,var(--red),var(--gold));
  transform:scaleX(0);transform-origin:left;
}
.card:hover{
  transform:translateY(-4px);
  box-shadow:0 30px 70px -48px rgba(8,21,35,.5);
  border-color:var(--line-2);
}
.card:hover::before{transform:scaleX(1)}
.card .ico{
  width:46px;height:46px;
  border-radius:3px;
  background:transparent;
  border:1px solid var(--line-2);
  color:var(--red);
  font-size:1.1rem;
  margin-bottom:26px;
}
.card:hover .ico{background:var(--navy);border-color:var(--navy);color:#fff}
.card h3{font-size:1.2rem;margin-bottom:12px;color:var(--ink)}
.card h3 small{font-family:var(--sans);font-size:.62rem;letter-spacing:.16em;color:var(--gold-2);margin-top:7px}
.card p{font-size:.91rem;line-height:1.82}
.card .more{margin-top:22px;font-size:.76rem;color:var(--red);letter-spacing:.05em}

/* Service ledger */
.ledger{border-top:1px solid var(--navy);margin-top:0}
.srow{grid-template-columns:96px 1fr;background:transparent}
.srow:hover{background:rgba(255,254,251,.74)}
.srow::after{width:2px;background:var(--red)}
.srow .num{padding-top:31px}
.srow .num span{
  width:48px;height:48px;
  border-radius:3px;
  border:1px solid var(--line-2);
  color:var(--red);
  font-size:1.08rem;
  background:rgba(255,255,255,.3);
}
.srow:hover .num span{border-color:var(--red);background:var(--red);color:#fff;transform:none}
.srow .scon{padding:31px 14px 31px 26px;grid-template-columns:minmax(210px,.42fr) 1fr;gap:34px}
.srow h3{font-size:1.22rem;letter-spacing:0;color:var(--navy)}
.srow h3 small{font-family:var(--sans);font-size:.61rem;color:var(--gold-2)}
.srow .sdesc{font-size:.93rem;line-height:1.86}

.taglist{gap:8px}
.taglist li{padding:7px 13px;border-color:var(--line-2);border-radius:3px;color:var(--ink-soft);font-size:.78rem;background:rgba(255,255,255,.34)}
.checklist{gap:15px}
.checklist li{padding-left:29px}
.checklist li::before{width:17px;height:17px;border-radius:2px;background:var(--red-soft);border:1px solid rgba(155,28,49,.15)}
.checklist li::after{left:5px;top:9px}

.person{border-radius:var(--r)}
.person .av{border-radius:3px;border:0;background:linear-gradient(135deg,var(--red),var(--navy))}
.timeline{border-left:1px solid var(--line-2);padding-left:38px}
.tl{padding-bottom:38px}
.tl::before{left:-44px;width:11px;height:11px;border:2px solid var(--cream);box-shadow:0 0 0 1px var(--gold);background:var(--red)}
.tl .yr{font-family:var(--latin);font-size:1.24rem;color:var(--red)}
.tl b{font-size:1.02rem;margin:5px 0}

/* Media */
.gallery{grid-auto-rows:185px;gap:12px}
.tile{
  border-radius:3px;
  padding:22px;
  border-color:rgba(255,255,255,.08);
}
.tile:hover{transform:translateY(-3px)}
.tile::before{background:linear-gradient(180deg,rgba(8,21,35,.02) 20%,rgba(8,21,35,.88) 100%)}
.tile .lab small{font-family:var(--sans);font-size:.59rem;letter-spacing:.18em}
.tile .lab b{font-size:1.07rem;letter-spacing:.02em}
.tile.g1{background-image:linear-gradient(140deg,#18324B,#081523)}
.tile.g2{background-image:linear-gradient(140deg,#A52B3E,#651321)}
.tile.g3{background-image:linear-gradient(140deg,#49677C,#142A3D)}
.tile.g4{background-image:linear-gradient(140deg,#80623F,#3C3023)}
.tile.g5{background-image:linear-gradient(140deg,#33475A,#11263F)}
.play{width:54px;height:54px;border-width:1px;background:rgba(8,21,35,.16);backdrop-filter:blur(4px)}

/* Events */
.evt{
  gap:24px;
  border-radius:4px;
  padding:20px 24px;
  background:rgba(255,254,251,.82);
}
.evt:hover{border-color:var(--line-2);transform:translateY(-2px);box-shadow:0 24px 60px -46px rgba(8,21,35,.55)}
.evt .evt-thumb{border-radius:2px;width:168px;height:100px}
.evt .date{
  width:68px;height:68px;
  border-radius:3px;
  background:var(--red-soft);
  border:1px solid rgba(155,28,49,.12);
}
.evt .date b{font-family:var(--latin);font-size:1.65rem}
.evt .date span{font-size:.61rem}
.evt h4{font-size:1.16rem;color:var(--ink)}
.evt .go{width:38px;height:38px;border-radius:3px;border-color:var(--line-2);color:var(--ink-soft)}
.evt:hover .go{background:var(--navy);border-color:var(--navy)}

/* Join steps */
.steps{gap:12px}
.step{
  grid-template-columns:50px 1fr;
  gap:18px;
  border-radius:4px;
  padding:22px 24px;
  background:rgba(255,254,251,.82);
}
.step::before{width:42px;height:42px;border-radius:3px;background:var(--navy);font-family:var(--latin);font-size:1.15rem}
.step b{font-size:1.08rem}

/* Contact form */
.cform{
  border-radius:4px;
  background:rgba(255,254,251,.88);
  box-shadow:0 28px 80px -58px rgba(8,21,35,.48);
}
.field{margin-bottom:20px}
.field label{font-size:.74rem;letter-spacing:.04em;color:var(--ink-soft)}
.field input,.field textarea{
  padding:14px 15px;
  border-radius:3px;
  background:#FBFAF7;
  border-color:var(--line);
}
.field input:focus,.field textarea:focus{border-color:var(--navy);box-shadow:0 0 0 2px rgba(17,38,63,.1)}
.contact-info{gap:20px}
.ci{gap:16px}
.ci .ci-ic{width:42px;height:42px;border-radius:3px;background:transparent;border:1px solid var(--line-2);color:var(--red)}
.ci b{font-size:.97rem}
.ci span{font-size:.88rem}

/* CTA */
.ctaband{
  text-align:left;
  background:
    linear-gradient(115deg,rgba(155,28,49,.95),rgba(120,20,38,.88) 40%,rgba(17,38,63,.98) 100%);
  border-block:1px solid rgba(176,138,89,.36);
}
.ctaband::before{
  left:auto;right:8%;top:-150px;transform:none;width:330px;height:330px;
  border-color:rgba(255,255,255,.12);
}
.ctaband::after{
  right:-80px;top:25%;transform:none;width:240px;height:240px;
  border-color:rgba(208,180,141,.3);
}
.ctaband .kk{justify-content:flex-start!important}
.ctaband .eyebrow{color:#E4CFB0}
.ctaband h2{max-width:18em;font-size:clamp(2.2rem,4.5vw,4rem);line-height:1.05;margin:14px 0 16px}
.ctaband p{max-width:42em;margin:0 0 30px;color:#E2E4E7;font-size:.98rem}
.ctaband .btn{background:#FFFEFB;color:var(--navy)}
.ctaband .btn:hover{background:#F0E9DF;color:var(--navy)}

/* Footer */
footer{
  background:#07121D;
  color:#95A0AA;
  padding:clamp(66px,8vw,96px) 0 34px;
}
.foot-grid{grid-template-columns:1.55fr .8fr .9fr 1.15fr;gap:clamp(28px,4vw,58px);margin-bottom:56px}
.foot-brand .seal{border-color:rgba(255,255,255,.3);border-radius:3px}
.foot-brand b{font-size:1.08rem;margin:18px 0 12px}
.foot-brand p{font-size:.86rem;color:#8E99A4}
footer h5{font-family:var(--sans);font-size:.7rem;text-transform:uppercase;letter-spacing:.13em;color:#D9DDE0;margin-bottom:20px}
footer ul{gap:11px}
footer ul a{color:#96A0AA}
footer ul a:hover{color:#fff;padding-left:0}
.foot-bot{border-color:rgba(255,255,255,.1);font-size:.73rem;color:#6E7B87}

/* Mobile menu */
.mmenu{
  background:var(--cream);
  padding-top:44px;
}
.mclose{font-family:var(--sans);font-size:1.7rem;color:var(--ink);border:1px solid var(--line);border-radius:3px;width:40px;height:40px;line-height:1}
.mgrp{padding:20px 0}
.mgrp>span{font-size:1.2rem;color:var(--ink)}
.mgrp a{padding:8px 0;font-size:.9rem}

/* Motion */
.reveal{transform:translateY(18px);transition-duration:.65s}

@media(max-width:1180px){
  .hero{min-height:auto}
  .hero-grid{grid-template-columns:1fr;gap:58px}
  .hero h1{max-width:11em}

}
@media(max-width:760px){

  .hero{padding:64px 0 70px;background-size:44px 44px}
  .hero h1{font-size:clamp(2.75rem,13vw,4.3rem);line-height:1.02}
  .hero .lead{font-size:.96rem;line-height:1.82}

  .stat b{font-size:1.35rem}
  .stat span{font-size:.62rem}
  .banner{padding:62px 0 50px}
  .banner h1{font-size:clamp(2.35rem,12vw,3.6rem)}
  .pad{padding:64px 0}
  .sec-head h2{font-size:clamp(2rem,10vw,2.8rem)}
  .card{padding:28px 24px}
  .srow{grid-template-columns:60px 1fr}
  .srow .num{padding-top:24px}
  .srow .num span{width:38px;height:38px;font-size:.88rem}
  .srow .scon{padding:24px 6px 26px 14px;gap:10px}
  .evt{padding:16px;gap:16px}
  .evt .evt-thumb{height:180px}
  .ctaband{text-align:left}
  .foot-grid{grid-template-columns:1fr;gap:34px}
  .foot-bot{gap:8px}
}


@media(max-width:480px){

  .burger span{width:19px}
}

function buildNav(){
  document.getElementById('navMain').innerHTML=NAV.map(n=>{
    if(n.children) return `<div class="nav-item"><span class="nav-link" data-grp="${n.children[0][0]}">${L(n.label[0],n.label[1])}<i class="car"></i></span><div class="dropdown">${n.children.map(c=>`<a onclick="go('${c[0]}')">${L(c[1],c[2])}</a>`).join('')}</div></div>`;
    return `<div class="nav-item"><button class="nav-link" data-route="${n.route}" onclick="go('${n.route}')">${L(n.label[0],n.label[1])}</button></div>`;
  }).join('');
  document.querySelectorAll('.nav-link[data-grp]').forEach(el=>el.onclick=()=>go(el.dataset.grp));
}
function buildMobile(){
  document.getElementById('mmenuBody').innerHTML=NAV.map(n=>{
    if(n.children) return `<div class="mgrp"><span>${L(n.label[0],n.label[1])}</span>${n.children.map(c=>`<a onclick="go('${c[0]}')">${L(c[1],c[2])}</a>`).join('')}</div>`;
    return `<div class="mgrp"><span onclick="go('${n.route}')">${L(n.label[0],n.label[1])}</span></div>`;
  }).join('')+`<div class="mgrp"><span onclick="go('join')">${L('加入我们','Join Us')}</span></div>`;
}

function setActive(route){
  document.querySelectorAll('.nav-link').forEach(el=>el.classList.remove('active'));
  const top=route.split('/')[0];
  document.querySelectorAll('.nav-link[data-route]').forEach(el=>{if(el.dataset.route===route)el.classList.add('active');});
  document.querySelectorAll('.nav-link[data-grp]').forEach(el=>{if(el.dataset.grp.split('/')[0]===top)el.classList.add('active');});
}
function initReveal(){const io=new IntersectionObserver((es)=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}}),{threshold:.1,rootMargin:'0px 0px -6% 0px'});document.querySelectorAll('.reveal').forEach(el=>io.observe(el));}
function render(){let route=(location.hash||'#/home').replace(/^#\//,'');if(!PAGES[route])route='home';document.getElementById('app').innerHTML=PAGES[route]();setActive(route);window.scrollTo({top:0,behavior:'auto'});initReveal();}
function go(route){location.hash='#/'+route;document.getElementById('mmenu').classList.remove('open');}
function setLang(l){LANG=l;document.body.dataset.lang=l;document.documentElement.lang=l==='zh'?'zh-CN':'en';document.getElementById('lzh').classList.toggle('on',l==='zh');document.getElementById('len').classList.toggle('on',l==='en');document.getElementById('brandName').textContent=L('英国浙江联谊会暨商贸会','Zhejiang UK Association');document.getElementById('navJoin').textContent=L('加入我们','Join Us');buildNav();buildMobile();buildFooter();render();}
document.getElementById('burger').onclick=()=>document.getElementById('mmenu').classList.add('open');
document.getElementById('mclose').onclick=()=>document.getElementById('mmenu').classList.remove('open');
window.addEventListener('hashchange',render);
buildNav();buildMobile();buildFooter();render();
</script>
